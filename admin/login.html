<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理員登入｜Aplus</title>
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body>
  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-card__brand">Aplus Admin</div>
      <h1 class="auth-card__title">管理員登入</h1>
      <p class="auth-card__desc">登入後即可管理文章、名單與成效。</p>

      <form id="login-form" class="auth-form">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="請輸入 Email" required />
        </div>

        <div class="form-field">
          <label for="password">密碼</label>
          <input id="password" name="password" type="password" placeholder="請輸入密碼" required />
        </div>

        <button id="login-btn" class="btn btn--primary auth-submit" type="submit">
          登入
        </button>

        <p id="login-message" class="auth-message"></p>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/admin-mobile-nav.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const supabase = window.supabaseClient;
      const form = document.getElementById("login-form");
      const message = document.getElementById("login-message");
      const loginBtn = document.getElementById("login-btn");

      if (!supabase) {
        message.textContent = "Supabase 尚未設定完成。";
        return;
      }

      const { data } = await supabase.auth.getSession();
      if (data.session) {
        window.location.href = "./index.html";
        return;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        message.textContent = "";
        loginBtn.disabled = true;
        loginBtn.textContent = "登入中...";

        const fd = new FormData(form);
        const email = fd.get("email");
        const password = fd.get("password");

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          message.textContent = error.message;
          loginBtn.disabled = false;
          loginBtn.textContent = "登入";
          return;
        }

        window.location.href = "./index.html";
      });
    });
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f8fc;
      font-family: Arial, sans-serif;
      color: #1e293b;
    }

    .auth-shell {
      width: 100%;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }

    .auth-card__brand {
      font-size: 13px;
      font-weight: 700;
      color: #c59b46;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .auth-card__title {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .auth-card__desc {
      margin: 0 0 24px;
      color: #64748b;
      line-height: 1.7;
    }

    .auth-form {
      display: grid;
      gap: 16px;
    }

    .form-field {
      display: grid;
      gap: 8px;
    }

    .form-field label {
      font-size: 14px;
      font-weight: 600;
    }

    .form-field input {
      height: 44px;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    .form-field input:focus {
      border-color: #c59b46;
      box-shadow: 0 0 0 3px rgba(197, 155, 70, 0.12);
    }

    .auth-submit {
      height: 46px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .auth-message {
      min-height: 20px;
      margin: 0;
      font-size: 14px;
      color: #dc2626;
    }
  </style>
</body>
</html>
