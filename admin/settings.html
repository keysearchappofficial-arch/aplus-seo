<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系統設定｜AI SEO 後台</title>

  <link rel="stylesheet" href="./css/admin-base.css" />
  <link rel="stylesheet" href="./css/admin-layout.css" />
  <link rel="stylesheet" href="./css/admin-components.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <div class="admin-sidebar__logo">A</div>
        <div>
          <strong>AI SEO</strong>
          <p>Admin</p>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="./index.html">Dashboard</a>
        <a href="./content.html">文章管理</a>
        <a href="./generate.html">AI 生成</a>
        <a href="./topics.html">題庫管理</a>
        <a href="./leads.html">名單管理</a>
        <a href="./analytics.html">成效分析</a>
        <a href="./settings.html" class="is-active">系統設定</a>
      </nav>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div>
          <h1>系統設定</h1>
          <p>設定自動產文預設值與排程條件</p>
        </div>
      </header>

      <main class="admin-content">
        <div class="card">
          <div class="card__body">
            <div style="display:grid;gap:14px;max-width:720px;">
              <input id="setting-industry" class="input" type="text" placeholder="預設產業" />
              <input id="setting-location" class="input" type="text" placeholder="預設地區" />
              <input id="setting-tone" class="input" type="text" placeholder="預設語氣" />
              <input id="setting-cta" class="input" type="text" placeholder="預設 CTA" />

              <select id="setting-frequency" class="input">
                <option value="daily">每日</option>
                <option value="every_2_days">每兩天</option>
                <option value="weekly">每週</option>
                <option value="unlimited">不限制</option>
              </select>

              <select id="setting-default-status" class="input">
                <option value="draft">草稿</option>
                <option value="published">直接發布</option>
              </select>

              <label style="display:flex;gap:10px;align-items:center;">
                <input id="setting-enabled" type="checkbox" />
                啟用自動產文
              </label>

              <button id="save-settings-btn" class="btn btn--primary" type="button">儲存設定</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/pages/settings.js"></script>
  <script src="./js/admin-mobile-nav.js"></script>
</body>
</html>
