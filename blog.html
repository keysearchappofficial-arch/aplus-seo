  <style>
    .blog-meta-overview {
      margin: 12px 0 0;
      color: #64748b;
      font-size: 14px;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .blog-card {
      display: block;
      height: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
    }

    .blog-card:hover {
      transform: translateY(-4px);
      border-color: #cbd5e1;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }

    .blog-card__thumb {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
      padding: 20px;
      background:
        radial-gradient(circle at top right, rgba(96, 165, 250, 0.20), transparent 28%),
        radial-gradient(circle at bottom left, rgba(37, 99, 235, 0.14), transparent 30%),
        linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
      border-bottom: 1px solid #e2e8f0;
      font-size: 28px;
      font-weight: 800;
      color: #1e3a8a;
      letter-spacing: .02em;
    }

    .blog-card__body {
      padding: 20px;
    }

    .inline-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      font-size: 13px;
      color: #64748b;
    }

    .inline-meta span {
      display: inline-flex;
      align-items: center;
    }

    .blog-card h3 {
      margin: 12px 0 10px;
      font-size: 22px;
      line-height: 1.45;
      color: #0f172a;
    }

    .blog-card p {
      margin: 0;
      color: #475569;
      line-height: 1.85;
      font-size: 15px;
    }

    .blog-card__more {
      display: inline-flex;
      align-items: center;
      margin-top: 16px;
      color: #2563eb;
      font-weight: 700;
      font-size: 14px;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 28px;
      border: 1px dashed #cbd5e1;
      border-radius: 20px;
      background: #f8fafc;
    }

    .empty-state h3 {
      margin: 0 0 10px;
      color: #0f172a;
    }

    .empty-state p {
      margin: 0;
      color: #64748b;
      line-height: 1.8;
    }

    @media (max-width: 960px) {
      .blog-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .blog-grid {
        grid-template-columns: 1fr;
      }

      .blog-card__thumb {
        min-height: 110px;
        font-size: 24px;
      }

      .blog-card h3 {
        font-size: 20px;
      }
    }
  </style>

<body>
  <div id="site-header"></div>

            </p>
          </div>
          <div class="cta-box__actions">
            <a href="./contact.html" class="btn btn--primary btn--lg">預約展示</a>
            <a href="./system.html" class="btn btn--secondary btn--lg">了解系統</a>
          </div>
        </div>

    </div>

  <div id="site-footer"></div>

  <script src="./assets/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./admin/js/supabase.js"></script>

  <script>
  const SITE_ORIGIN = "https://www.keysearch-app.com";

  async function loadArticles() {
    const supabase = window.supabaseClient;
    if (!supabase) {
      throw new Error("文章未載入");
    }

    const { data, error } = await supabase
      .from("articles")
      .select(`
        id,
        title,
        slug,
        summary,
        seo_title,
        seo_description,
        status,
        source,
        views,
        published_at,
        created_at,
        topic_title
      `)
      .eq("status", "published")
      .order("published_at", { ascending: false });

    if (error) throw error;

    return data || [];
  }

  function formatDate(dateString) {
    if (!dateString) return "";
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return "";

    return date.toLocaleDateString("zh-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function buildArticleCard(article) {
    const title = escapeHtml(article.title || "未命名文章");
    const summary = escapeHtml(
      article.summary ||
      article.seo_description ||
      "查看這篇文章，了解更多 SEO 內容策略與流量成長方法。"
    );
    const category = escapeHtml(article.topic_title || "SEO 文章");
    const badgeText = "SEO";
    const dateText = formatDate(article.published_at || article.created_at);
    const slug = encodeURIComponent(article.slug || "");

    return `
      <a class="blog-card" href="./article.html?slug=${slug}&source=blog">
        <div class="blog-card__thumb">${badgeText}</div>
        <div class="blog-card__body">
          <div class="inline-meta">
            <span>${category}</span>
            <span>${dateText}</span>
          </div>
          <h3>${title}</h3>
          <p>${summary}</p>
          <span class="blog-card__more">閱讀全文 →</span>
        </div>
      </a>
    `;
  }

  function injectBlogItemListSchema(articles) {
    const oldScript = document.getElementById("blog-itemlist-schema");
    if (oldScript) oldScript.remove();

    const schema = {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Aplus AI SEO 文章列表",
      "itemListOrder": "https://schema.org/ItemListOrderDescending",
      "numberOfItems": articles.length,
      "itemListElement": articles.map((article, index) => ({
        "@type": "ListItem",
        "position": index + 1,
        "url": `${SITE_ORIGIN}/article.html?slug=${encodeURIComponent(article.slug || "")}`,
        "name": article.title || "未命名文章",
        "description":
          article.summary ||
          article.seo_description ||
          "SEO 與內容流量相關文章"
      }))
    };

    const script = document.createElement("script");
    script.type = "application/ld+json";
    script.id = "blog-itemlist-schema";
    script.textContent = JSON.stringify(schema);
    document.head.appendChild(script);
  }

  async function renderBlog() {
    const listEl = document.getElementById("blog-list");
    const countEl = document.getElementById("article-count");

    try {
      const articles = await loadArticles();

      if (countEl) {
        countEl.textContent = String(articles.length);
      }

      if (!articles.length) {
        listEl.innerHTML = `
          <div class="empty-state">
            <h3>目前尚無文章</h3>
            <p>文章準備中，之後這裡會持續更新 SEO 與內容獲客相關內容。</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = articles.map(buildArticleCard).join("");
      injectBlogItemListSchema(articles);
    } catch (error) {
      console.error("載入文章失敗：", error);
      listEl.innerHTML = `
        <div class="empty-state">
          <h3>文章載入失敗</h3>
          <p>${escapeHtml(error.message)}</p>
        </div>
      `;
    }
  }

  renderBlog();
</script>
