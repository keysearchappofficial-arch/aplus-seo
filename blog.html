  <script src="./assets/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./admin/js/supabase.js"></script>

  <script>
    async function loadArticles() {
      const supabase = window.supabaseClient;
      if (!supabase) {
        throw new Error("文章未載入");
      }

      const { data, error } = await supabase
        .from("articles")
        .select("*")
        .eq("status", "published")
        .order("published_at", { ascending: false });

      if (error) throw error;

      return data || [];
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "";

      return date.toLocaleDateString("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function buildArticleCard(article) {
      const title = escapeHtml(article.title || "未命名文章");
      const summary = escapeHtml(article.summary || "查看這篇文章，了解更多 SEO 內容策略與流量成長方法。");
      const category = escapeHtml(article.category || "SEO 文章");
      const dateText = formatDate(article.published_at || article.created_at);
      const slug = encodeURIComponent(article.slug || "");

      return `
        <a class="blog-card" href="./article.html?slug=${slug}&source=blog">
          <div class="blog-card__body">
            <div class="inline-meta" style="margin-bottom:10px;">
              <span>${category}</span>
              <span>${dateText}</span>
            </div>
            <h3>${title}</h3>
            <p>${summary}</p>
            <span class="blog-card__more">閱讀全文 →</span>
          </div>
        </a>
      `;
    }

    async function renderBlog() {
      const listEl = document.getElementById("blog-list");

      try {
        const articles = await loadArticles();

        if (!articles.length) {
          listEl.innerHTML = `
            <div class="empty-state">
              <h3>目前尚無文章</h3>
              <p>文章準備中，之後這裡會持續更新 SEO 與內容獲客相關內容。</p>
            </div>
          `;
          return;
        }

        listEl.innerHTML = articles.map(buildArticleCard).join("");
      } catch (error) {
        console.error("載入文章失敗：", error);
        listEl.innerHTML = `
          <div class="empty-state">
            <h3>文章載入失敗</h3>
            <p>${escapeHtml(error.message)}</p>
          </div>
        `;
      }
    }

    renderBlog();
  </script>
